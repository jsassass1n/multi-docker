name: CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Build development/test image
      - name: Build test Docker image
        run: docker build -t jaymorningstar/react-test -f ./client/Dockerfile.dev ./client

      # Run tests
      - name: Run tests
        run: docker run jaymorningstar/react-test npm test -- --coverage --watchAll=false

      # Only reached if tests passed
      - name: Build production images
        run: |
          docker build -t jaymorningstar/multi-client ./client
          docker build -t jaymorningstar/multi-nginx ./nginx
          docker build -t jaymorningstar/multi-server ./server
          docker build -t jaymorningstar/multi-worker ./worker

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Push images to Docker Hub
        run: |
          docker push jaymorningstar/multi-client
          docker push jaymorningstar/multi-nginx
          docker push jaymorningstar/multi-server
          docker push jaymorningstar/multi-worker
